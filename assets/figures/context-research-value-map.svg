<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">用户记忆与 Context Engineering：研究价值体系图</title>
  <desc id="desc">展示贴身多端数据资产、用户记忆工程研究价值点、高质量个性化上下文、Agent 能力与生态价值，以及评估反馈闭环之间的逻辑关系。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef7f4"/>
    </linearGradient>
    <linearGradient id="guard" x1="0" x2="1">
      <stop offset="0" stop-color="#eff7ff"/>
      <stop offset="1" stop-color="#effaf6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#19324d" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L14,8 L2,14 Z" fill="#6d8096"/>
    </marker>
    <marker id="arrowBlue" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L14,8 L2,14 Z" fill="#1d6ec9"/>
    </marker>
    <style>
      .title { font: 700 46px "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #10243d; }
      .subtitle { font: 500 22px "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #56677a; }
      .group-title { font: 700 25px "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #122840; }
      .label { font: 600 21px "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #1b344d; }
      .small { font: 500 18px "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #536579; }
      .tiny { font: 500 16px "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif; fill: #5d6d7e; }
      .num { font: 800 21px "Inter", Arial, sans-serif; fill: #ffffff; }
      .metric { font: 600 17px "Inter", "Microsoft YaHei", Arial, sans-serif; fill: #42566c; }
      .chip { fill: #ffffff; stroke: #d9e7f2; stroke-width: 1.5; }
      .card { fill: #ffffff; stroke: #d5e4f0; stroke-width: 2; filter: url(#shadow); }
      .module { fill: #f5fbff; stroke: #b7d8f2; stroke-width: 2; }
      .moduleAlt { fill: #f3fbf8; stroke: #a8dcc9; stroke-width: 2; }
      .orange { fill: #fff7ed; stroke: #f4bc76; stroke-width: 2; }
      .line { fill: none; stroke: #6d8096; stroke-width: 3; marker-end: url(#arrow); }
      .lineBlue { fill: none; stroke: #1d6ec9; stroke-width: 4; marker-end: url(#arrowBlue); }
      .loop { fill: none; stroke: #7e90a5; stroke-width: 3; stroke-dasharray: 10 10; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect x="58" y="50" width="1804" height="972" rx="34" fill="none" stroke="#dce9f3" stroke-width="2"/>

  <text x="960" y="105" text-anchor="middle" class="title">用户记忆与 Context Engineering：研究价值体系图</text>
  <text x="960" y="143" text-anchor="middle" class="subtitle">把贴身多端数据转化为更短、更准、可解释、可遗忘的个性化上下文</text>

  <rect x="150" y="175" width="1620" height="82" rx="24" fill="#ffffff" stroke="#d7e7f2" stroke-width="2"/>
  <text x="202" y="226" class="group-title">学术热点坐标</text>
  <g transform="translate(430 194)">
    <rect class="chip" x="0" y="0" width="160" height="44" rx="22"/><text class="metric" x="80" y="28" text-anchor="middle">Agent Memory</text>
    <rect class="chip" x="178" y="0" width="78" height="44" rx="22"/><text class="metric" x="217" y="28" text-anchor="middle">RAG</text>
    <rect class="chip" x="274" y="0" width="194" height="44" rx="22"/><text class="metric" x="371" y="28" text-anchor="middle">Context Engineering</text>
    <rect class="chip" x="486" y="0" width="292" height="44" rx="22"/><text class="metric" x="632" y="28" text-anchor="middle">Privacy-Preserving Personalization</text>
    <rect class="chip" x="796" y="0" width="98" height="44" rx="22"/><text class="metric" x="845" y="28" text-anchor="middle">Edge AI</text>
    <rect class="chip" x="912" y="0" width="126" height="44" rx="22"/><text class="metric" x="975" y="28" text-anchor="middle">Evaluation</text>
  </g>

  <rect x="106" y="302" width="314" height="420" rx="28" class="card"/>
  <text x="263" y="354" text-anchor="middle" class="group-title">贴身多端数据资产</text>
  <g class="small">
    <rect x="146" y="388" width="108" height="44" rx="22" class="chip"/><text x="200" y="417" text-anchor="middle">手机</text>
    <rect x="270" y="388" width="108" height="44" rx="22" class="chip"/><text x="324" y="417" text-anchor="middle">可穿戴</text>
    <rect x="146" y="452" width="108" height="44" rx="22" class="chip"/><text x="200" y="481" text-anchor="middle">耳机</text>
    <rect x="270" y="452" width="108" height="44" rx="22" class="chip"/><text x="324" y="481" text-anchor="middle">音箱</text>
    <rect x="146" y="516" width="108" height="44" rx="22" class="chip"/><text x="200" y="545" text-anchor="middle">智能家居</text>
    <rect x="270" y="516" width="108" height="44" rx="22" class="chip"/><text x="324" y="545" text-anchor="middle">车机</text>
    <rect x="146" y="580" width="108" height="44" rx="22" class="chip"/><text x="200" y="609" text-anchor="middle">客服</text>
    <rect x="270" y="580" width="108" height="44" rx="22" class="chip"/><text x="324" y="609" text-anchor="middle">显式反馈</text>
  </g>
  <text x="263" y="675" text-anchor="middle" class="tiny">真实场景 · 多模态 · 连续状态</text>

  <rect x="492" y="292" width="650" height="448" rx="30" fill="url(#guard)" stroke="#c6dceb" stroke-width="2.5" stroke-dasharray="12 9"/>
  <text x="817" y="344" text-anchor="middle" class="group-title">值得研究的价值点</text>
  <text x="817" y="375" text-anchor="middle" class="tiny">从数据噪声到可用记忆，再到可控上下文</text>

  <g>
    <rect x="530" y="410" width="280" height="72" rx="18" class="module"/>
    <circle cx="566" cy="446" r="20" fill="#1d6ec9"/><text x="566" y="453" text-anchor="middle" class="num">1</text>
    <text x="594" y="453" class="label">数据治理与脱敏</text>

    <rect x="824" y="410" width="280" height="72" rx="18" class="moduleAlt"/>
    <circle cx="860" cy="446" r="20" fill="#0f9f7a"/><text x="860" y="453" text-anchor="middle" class="num">2</text>
    <text x="888" y="453" class="label">记忆抽取与评分</text>

    <rect x="530" y="505" width="280" height="72" rx="18" class="moduleAlt"/>
    <circle cx="566" cy="541" r="20" fill="#0f9f7a"/><text x="566" y="548" text-anchor="middle" class="num">3</text>
    <text x="594" y="533" class="label">结构化记忆</text>
    <text x="594" y="559" class="small">Schema / Taxonomy</text>

    <rect x="824" y="505" width="280" height="72" rx="18" class="module"/>
    <circle cx="860" cy="541" r="20" fill="#1d6ec9"/><text x="860" y="548" text-anchor="middle" class="num">4</text>
    <text x="888" y="548" class="label">检索重排与冲突处理</text>

    <rect x="530" y="600" width="280" height="72" rx="18" class="module"/>
    <circle cx="566" cy="636" r="20" fill="#1d6ec9"/><text x="566" y="643" text-anchor="middle" class="num">5</text>
    <text x="594" y="628" class="label">Context Composer</text>
    <text x="594" y="654" class="small">与压缩</text>

    <rect x="824" y="600" width="280" height="72" rx="18" class="orange"/>
    <circle cx="860" cy="636" r="20" fill="#e8892e"/><text x="860" y="643" text-anchor="middle" class="num">6</text>
    <text x="888" y="643" class="label">隐私授权与用户可控</text>
  </g>

  <path d="M420 512 C452 512 462 512 492 512" class="line"/>
  <path d="M420 512 C458 440 480 430 530 446" class="line"/>
  <path d="M420 512 C458 600 480 628 530 636" class="line"/>

  <path d="M1142 482 C1174 482 1194 482 1228 482" class="lineBlue"/>
  <path d="M1142 604 C1192 580 1198 540 1228 522" class="line"/>

  <rect x="1228" y="390" width="280" height="188" rx="32" fill="#0f355b" filter="url(#shadow)"/>
  <text x="1368" y="448" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="27" font-weight="700" fill="#ffffff">高质量个性化上下文</text>
  <text x="1368" y="492" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="600" fill="#d8efff">更短 · 更准</text>
  <text x="1368" y="522" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="600" fill="#d8efff">可解释 · 可遗忘</text>
  <text x="1368" y="554" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#9fd3ff">Context Package</text>

  <rect x="1592" y="302" width="260" height="420" rx="28" class="card"/>
  <text x="1722" y="354" text-anchor="middle" class="group-title">Agent 能力</text>
  <text x="1722" y="386" text-anchor="middle" class="group-title">与生态价值</text>
  <g class="small">
    <rect x="1624" y="420" width="196" height="44" rx="22" class="chip"/><text x="1722" y="449" text-anchor="middle">个性化 Agent</text>
    <rect x="1624" y="484" width="196" height="44" rx="22" class="chip"/><text x="1722" y="513" text-anchor="middle">跨设备连续体验</text>
    <rect x="1624" y="548" width="196" height="44" rx="22" class="chip"/><text x="1722" y="577" text-anchor="middle">更低 token 成本</text>
    <rect x="1624" y="612" width="196" height="44" rx="22" class="chip"/><text x="1722" y="641" text-anchor="middle">可评估可治理</text>
    <rect x="1624" y="676" width="196" height="44" rx="22" class="chip"/><text x="1722" y="705" text-anchor="middle">长期生态壁垒</text>
  </g>
  <path d="M1508 484 C1542 484 1558 484 1592 484" class="lineBlue"/>

  <rect x="165" y="805" width="1590" height="150" rx="30" fill="#ffffff" stroke="#d5e4f0" stroke-width="2" filter="url(#shadow)"/>
  <text x="230" y="856" class="group-title">评估与反馈闭环</text>
  <g transform="translate(485 827)">
    <rect class="chip" x="0" y="0" width="212" height="44" rx="22"/><text class="metric" x="106" y="28" text-anchor="middle">Memory Precision / Recall</text>
    <rect class="chip" x="232" y="0" width="196" height="44" rx="22"/><text class="metric" x="330" y="28" text-anchor="middle">Personalization Gain</text>
    <rect class="chip" x="448" y="0" width="178" height="44" rx="22"/><text class="metric" x="537" y="28" text-anchor="middle">Context Efficiency</text>
    <rect class="chip" x="646" y="0" width="162" height="44" rx="22"/><text class="metric" x="727" y="28" text-anchor="middle">Privacy Leakage</text>
    <rect class="chip" x="828" y="0" width="158" height="44" rx="22"/><text class="metric" x="907" y="28" text-anchor="middle">Staleness Error</text>
  </g>
  <rect x="760" y="890" width="400" height="46" rx="23" fill="#fff7ed" stroke="#f4bc76" stroke-width="2"/>
  <text x="960" y="920" text-anchor="middle" class="label">记忆更新 / 降权 / 遗忘</text>

  <path d="M1722 722 C1722 782 1530 805 1300 805" class="loop"/>
  <path d="M760 913 C610 913 492 820 492 672" class="loop"/>

  <rect x="118" y="288" width="1728" height="500" rx="36" fill="none" stroke="#e8892e" stroke-width="3" stroke-dasharray="14 12"/>
  <text x="1386" y="766" class="small" fill="#bd6a1c">跨系统护栏：隐私授权 · 用户可控 · 审计追溯</text>
</svg>
