<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Context Engineering Living City</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app" class="app-shell" data-view="world">
      <header class="topbar" aria-label="全局导航">
        <button class="icon-button" id="backButton" type="button" aria-label="返回上一层" title="返回上一层">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 18l-6-6 6-6" /></svg>
        </button>
        <div class="brand-lockup">
          <span class="brand-mark"></span>
          <div>
            <strong>Context Engineering</strong>
            <span>Living City GenUI</span>
          </div>
        </div>
        <label class="search-box" aria-label="搜索研究节点">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7" /><path d="M20 20l-3.6-3.6" /></svg>
          <input id="searchInput" type="search" placeholder="搜索：Compiler / 记忆 / 证据 / 隐私 / GenUI" autocomplete="off" />
        </label>
        <nav class="layer-switcher" aria-label="图层开关">
          <button class="layer-toggle" type="button" data-layer="evidence" aria-pressed="false">
            <span class="dot evidence-dot"></span>证据
          </button>
          <button class="layer-toggle" type="button" data-layer="risk" aria-pressed="false">
            <span class="dot risk-dot"></span>风险
          </button>
          <button class="layer-toggle" type="button" data-layer="questions" aria-pressed="false">
            <span class="dot question-dot"></span>问题
          </button>
        </nav>
      </header>

      <main class="stage" id="stage" aria-live="polite"></main>

      <aside class="detail-drawer" id="detailDrawer" aria-label="节点详情">
        <div class="drawer-head">
          <span id="drawerKicker">研究节点</span>
          <button class="icon-button small" id="drawerClose" type="button" aria-label="关闭详情" title="关闭详情">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18" /></svg>
          </button>
        </div>
        <div id="drawerContent"></div>
      </aside>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
